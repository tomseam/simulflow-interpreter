<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>同声传译</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f2f2f7;--card:rgba(255,255,255,.72);--card2:rgba(255,255,255,.45);--text:#1d1d1f;--sub:#86868b;--border:rgba(0,0,0,.06);--accent:#007aff;--green:#34c759;--red:#ff3b30;--purple:#af52de;--blur:20px;--r:18px;--shadow:0 4px 24px rgba(0,0,0,.06)}
.dark{--bg:#000;--card:rgba(28,28,30,.78);--card2:rgba(44,44,46,.5);--text:#f5f5f7;--sub:#8e8e93;--border:rgba(255,255,255,.08);--accent:#0a84ff;--green:#30d158;--red:#ff453a;--purple:#bf5af2;--shadow:0 4px 24px rgba(0,0,0,.4)}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .3s,color .3s}
body.dark{background:#000;color:#f5f5f7}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bg .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;will-change:transform;animation:float 20s ease-in-out infinite}
body.dark .bg .blob{opacity:.18}
.bg .b1{width:340px;height:340px;background:#007aff;top:-80px;left:-60px}
.bg .b2{width:280px;height:280px;background:#bf5af2;top:40%;right:-80px;animation-delay:-7s}
.bg .b3{width:260px;height:260px;background:#30d158;bottom:-60px;left:30%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.05)}50%{transform:translate(-20px,30px) scale(.95)}75%{transform:translate(20px,10px) scale(1.02)}}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;overflow:hidden}
.glass{background:var(--card);-webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.hdr{padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr .title{text-align:center;flex:1}
.hdr .title h1{font-size:17px;font-weight:700}
.hdr .title p{font-size:9px;color:var(--sub);margin-top:1px}
.hdr-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--card);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.hdr-btn:active{transform:scale(.9)}
.tabs{display:flex;gap:4px;padding:4px 14px;flex-shrink:0}
.tab{flex:1;padding:8px;border-radius:10px;border:none;background:transparent;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.on{background:var(--accent);color:#fff}
.acc{margin:6px 14px 0;flex-shrink:0}
.acc-trig{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;cursor:pointer}
.acc-trig:active{transform:scale(.98)}
.acc-trig .tri{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:9px solid var(--accent);transition:transform .3s}
.acc-trig.open .tri{transform:rotate(180deg)}
.acc-trig .val{font-size:13px;color:var(--accent);font-weight:600}
.acc-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);margin-top:6px}
.acc-body.open{max-height:800px}
.acc-inner{padding:10px}
.acc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.acc-item{padding:12px 4px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;background:var(--card2)}
.acc-item:active{transform:scale(.95)}
.acc-item.sel{border-color:var(--accent);background:rgba(0,122,255,.1)}
.acc-item .fl{font-size:20px;display:block;margin-bottom:2px}
.acc-item .nm{font-size:10px;font-weight:600}
.status{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--sub);transition:all .3s}
.dot.rec{background:var(--red);box-shadow:0 0 10px var(--red);animation:blink 1s infinite}
.dot.tts{background:var(--green);box-shadow:0 0 10px var(--green);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-size:11px;color:var(--sub)}
.wave{display:flex;align-items:center;justify-content:center;gap:2px;height:20px;flex-shrink:0;opacity:0;transition:opacity .3s}
.wave.on{opacity:1}
.wave i{width:2.5px;background:var(--accent);border-radius:2px;display:block;animation:wv .5s ease-in-out infinite}
.wave i:nth-child(1){height:6px;animation-delay:0s}
.wave i:nth-child(2){height:12px;animation-delay:.08s}
.wave i:nth-child(3){height:18px;animation-delay:.16s}
.wave i:nth-child(4){height:12px;animation-delay:.24s}
.wave i:nth-child(5){height:6px;animation-delay:.32s}
@keyframes wv{0%,100%{transform:scaleY(.25)}50%{transform:scaleY(1)}}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 14px;min-height:0}
.content-hdr{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;padding:4px 2px;flex-shrink:0;display:flex;justify-content:space-between}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.item{padding:12px;margin-bottom:6px;border-radius:14px;background:var(--card);-webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));border:1px solid var(--border);box-shadow:var(--shadow);animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.item .src{font-size:14px;line-height:1.5;color:var(--text);margin-bottom:2px}
.item .tgt{font-size:13px;line-height:1.5;color:var(--accent);font-weight:500}
.item .meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.item .meta span{font-size:9px;color:var(--sub);padding:2px 6px;border-radius:4px;background:var(--card2)}
.item .speaker-a .src{color:var(--accent)}
.item .speaker-b .src{color:var(--purple)}
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:12px;line-height:2.2}
.bottom{flex-shrink:0;padding:4px 14px 0}
.toolbar{display:flex;gap:6px;margin-bottom:6px}
.tool-btn{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--card);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);font-size:11px;font-weight:600;color:var(--text);cursor:pointer;text-align:center;transition:all .15s}
.tool-btn:active{transform:scale(.95)}
.tool-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool-btn .ico{font-size:16px;display:block;margin-bottom:2px}
.home-area{display:flex;justify-content:center;padding:4px 0 8px}
.home-btn{width:64px;height:64px;border-radius:50%;border:3px solid var(--border);background:var(--card);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.home-btn:active{transform:scale(.88)}
.home-btn .ring{width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,#fff,#e8e8ed);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
body.dark .home-btn .ring{background:linear-gradient(145deg,#3a3a3c,#2c2c2e)}
.home-btn.active{border-color:var(--green);box-shadow:0 0 24px rgba(52,199,89,.25)}
.home-btn.active .ring{background:linear-gradient(145deg,var(--green),#28a745);box-shadow:0 0 16px rgba(52,199,89,.3)}
.home-btn.active .ring .ico{color:#fff}
.subtitle-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:rgba(0,0,0,.95);flex-direction:column;align-items:center;justify-content:center;padding:40px}
.subtitle-overlay.show{display:flex}
.subtitle-overlay .so{font-size:32px;color:#fff;text-align:center;line-height:1.6;max-width:85%}
.subtitle-overlay .st{font-size:40px;color:var(--accent);text-align:center;line-height:1.6;font-weight:700;max-width:85%;margin-top:12px}
.subtitle-overlay .sl{font-size:22px;color:rgba(255,255,255,.4);margin-top:24px;text-align:center}
.subtitle-overlay .close-btn{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.settings-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:998;background:rgba(0,0,0,.5);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);flex-direction:column;justify-content:flex-end}
.settings-overlay.show{display:flex}
.settings-panel{background:var(--card);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-radius:20px 20px 0 0;padding:20px;max-height:70vh;overflow-y:auto}
.settings-panel h3{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px;font-weight:500}
.setting-desc{font-size:11px;color:var(--sub);margin-top:2px}
.setting-toggle{width:50px;height:30px;border-radius:15px;border:none;background:var(--sub);cursor:pointer;position:relative;transition:background .3s}
.setting-toggle.on{background:var(--green)}
.setting-toggle::after{content:'';position:absolute;top:2px;left:2px;width:26px;height:26px;border-radius:50%;background:#fff;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.setting-toggle.on::after{transform:translateX(20px)}
.setting-select{padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;outline:none}
.setting-range{-webkit-appearance:none;width:120px;height:4px;background:var(--sub);border-radius:2px;outline:none}
.setting-range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer}
</style>
</head>
<body>
<div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div class="wrap">
  <div class="hdr">
    <button class="hdr-btn" onclick="exportHistory()" title="导出">📤</button>
    <div class="title"><h1>🌐 同声传译</h1><p>SimulFlow · Perfect Edition</p></div>
    <button class="hdr-btn" onclick="openSettings()" title="设置">⚙️</button>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="setMode('single',this)">单向翻译</button>
    <button class="tab" onclick="setMode('both',this)">双向翻译</button>
    <button class="tab" onclick="setMode('dialog',this)">对话模式</button>
  </div>
  <div class="acc glass" id="accBox">
    <div class="acc-trig" id="accTrig" onclick="toggleAcc()"><div class="tri"></div><span class="val" id="pairLbl">中文 → English</span></div>
    <div class="acc-body" id="accBody"><div class="acc-inner"><div class="acc-grid" id="grid"></div></div></div>
  </div>
  <div class="status"><div class="dot" id="dot"></div><span class="stxt" id="stxt">就绪</span></div>
  <div class="wave" id="wave"><i></i><i></i><i></i><i></i><i></i></div>
  <div class="content">
    <div class="content-hdr"><span>翻译记录</span><span id="cnt">0 句</span></div>
    <div class="scroll" id="logsEl"><div class="empty">🎧 连接 AirPods<br>点击开始按钮<br>支持单向/双向/对话三种模式</div></div>
  </div>
  <div class="bottom">
    <div class="toolbar">
      <button class="tool-btn" onclick="toggleSubtitle()" id="subBtn"><span class="ico">📺</span>字幕</button>
      <button class="tool-btn on" onclick="toggleSpeaker()" id="spkBtn"><span class="ico">🔊</span>播报开</button>
      <button class="tool-btn" onclick="swapLang()" id="swapBtn"><span class="ico">🔄</span>互换</button>
    </div>
    <div class="home-area">
      <div class="home-btn" id="homeBtn" onclick="toggle()"><div class="ring"><span class="ico" id="ico">▶</span></div></div>
    </div>
  </div>
</div>
<div class="subtitle-overlay" id="subOverlay">
  <button class="close-btn" onclick="toggleSubtitle()">✕</button>
  <div class="so" id="subOrig"></div>
  <div class="st" id="subTrans"></div>
  <div class="sl" id="subLive"></div>
</div>
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h3>⚙️ 设置</h3>
    <div class="setting-row"><div><div class="setting-label">深色模式</div></div><button class="setting-toggle" id="darkToggle" onclick="toggleDark()"></button></div>
    <div class="setting-row"><div><div class="setting-label">自动播报</div></div><button class="setting-toggle on" id="speakToggle" onclick="toggleSpeak()"></button></div>
    <div class="setting-row"><div><div class="setting-label">播报声音</div><div class="setting-desc" id="voiceDesc">自动选择</div></div><select class="setting-select" id="voiceSel" onchange="setVoice(this.value)" style="max-width:140px;font-size:11px"><option value="auto">自动</option></select></div>
    <div class="setting-row"><div><div class="setting-label">播报语速</div><div class="setting-desc" id="rateDesc">0.85x</div></div><input type="range" class="setting-range" id="rateRange" min="3" max="10" value="8" oninput="setRate(this.value)"></div>
    <div class="setting-row"><div><div class="setting-label">翻译引擎</div></div><select class="setting-select" id="engineSel" onchange="engine=this.value"><option value="parallel">并行(最快)</option><option value="google">Google</option><option value="mymemory">MyMemory</option></select></div>
    <div class="setting-row"><div><div class="setting-label">导出翻译历史</div></div><button class="tool-btn" style="flex:none;padding:8px 16px" onclick="exportHistory()">📤 导出</button></div>
  </div>
</div>
<script src="dict.js"></script>
<script>
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var src='zh-CN',tgt='en-US',run=false,rec=null,ct=0,chars=0,t0=0;
var done={},warmTts=false,mode='single',speaker='A';
var speakOn=true,subOn=false,darkMode=false,engine='parallel',speechRate=0.85,selectedVoice=null;
var history=[],isSpeaking=false;

var PAIRS=[
['zh-CN','en-US','中文','English','🇨🇳','🇺🇸'],['en-US','zh-CN','English','中文','🇺🇸','🇨🇳'],
['zh-CN','ja-JP','中文','日本語','🇨🇳','🇯🇵'],['ja-JP','zh-CN','日本語','中文','🇯🇵','🇨🇳'],
['zh-CN','ko-KR','中文','한국어','🇨🇳','🇰🇷'],['ko-KR','zh-CN','한국어','中文','🇰🇷','🇨🇳'],
['en-US','ja-JP','English','日本語','🇺🇸','🇯🇵'],['ja-JP','en-US','日本語','English','🇯🇵','🇺🇸'],
['en-US','ko-KR','English','한국어','🇺🇸','🇰🇷'],['ko-KR','en-US','한국어','English','🇰🇷','🇺🇸'],
['en-US','fr-FR','English','Français','🇺🇸','🇫🇷'],['fr-FR','en-US','Français','English','🇫🇷','🇺🇸'],
['en-US','de-DE','English','Deutsch','🇺🇸','🇩🇪'],['de-DE','en-US','Deutsch','English','🇩🇪','🇺🇸'],
['en-US','es-ES','English','Español','🇺🇸','🇪🇸'],['es-ES','en-US','Español','English','🇪🇸','🇺🇸'],
['en-US','ru-RU','English','Русский','🇺🇸','🇷🇺'],['ru-RU','en-US','Русский','English','🇷🇺','🇺🇸'],
['en-US','vi-VN','English','Tiếng Việt','🇺🇸','🇻🇳'],['vi-VN','en-US','Tiếng Việt','English','🇻🇳','🇺🇸'],
['en-US','th-TH','English','ไทย','🇺🇸','🇹🇭'],['th-TH','en-US','ไทย','English','🇹🇭','🇺🇸'],
['en-US','ar-SA','English','العربية','🇺🇸','🇸🇦'],['ar-SA','en-US','العربية','English','🇸🇦','🇺🇸'],
['en-US','hi-IN','English','हिन्दी','🇺🇸','🇮🇳'],['hi-IN','en-US','हिन्दी','English','🇮🇳','🇺🇸'],
['en-US','pt-BR','English','Português','🇺🇸','🇧🇷'],['en-US','it-IT','English','Italiano','🇺🇸','🇮🇹'],
['en-US','id-ID','English','Bahasa','🇺🇸','🇮🇩'],['ja-JP','ko-KR','日本語','한국어','🇯🇵','🇰🇷'],
['ko-KR','ja-JP','한국어','日本語','🇰🇷','🇯🇵'],['zh-CN','fr-FR','中文','Français','🇨🇳','🇫🇷'],
['zh-CN','de-DE','中文','Deutsch','🇨🇳','🇩🇪'],['zh-CN','es-ES','中文','Español','🇨🇳','🇪🇸'],
['zh-CN','ru-RU','中文','Русский','🇨🇳','🇷🇺'],
];

var grid=document.getElementById('grid');
PAIRS.forEach(function(p){
  var d=document.createElement('div');
  d.className='acc-item'+(p[0]===src&&p[1]===tgt?' sel':'');
  d.innerHTML='<span class="fl">'+p[4]+'→'+p[5]+'</span><div class="nm">'+p[2]+'→'+p[3]+'</div>';
  d.onclick=function(){src=p[0];tgt=p[1];grid.querySelectorAll('.acc-item').forEach(function(x){x.classList.remove('sel')});d.classList.add('sel');$('pairLbl').textContent=p[2]+' → '+p[3];toggleAcc();if(run){stop();setTimeout(go,300)}};
  grid.appendChild(d);
});

if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){darkMode=true;document.body.classList.add('dark');$('darkToggle').classList.add('on')}
function $(id){return document.getElementById(id)}
function toggleAcc(){$('accTrig').classList.toggle('open');$('accBody').classList.toggle('open')}
function setMode(m,btn){mode=m;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});btn.classList.add('on');if(m==='both')$('pairLbl').textContent='自动检测 → 双向';else if(m==='dialog')$('pairLbl').textContent='对话模式 (A↔B)';else $('pairLbl').textContent=getLn(src)+' → '+getLn(tgt);if(run){stop();setTimeout(go,300)}}
function getLn(c){var p=PAIRS.find(function(x){return x[0]===c});return p?p[2]:c.split('-')[0]}
function toggleSubtitle(){subOn=!subOn;$('subBtn').classList.toggle('on',subOn);$('subOverlay').classList.toggle('show',subOn)}
function toggleSpeaker(){speakOn=!speakOn;$('spkBtn').classList.toggle('on',speakOn);$('spkBtn').innerHTML='<span class="ico">'+(speakOn?'🔊':'🔇')+'</span>'+(speakOn?'播报开':'播报关')}
function swapLang(){var t=src;src=tgt;tgt=t;if(run){stop();setTimeout(go,300)}$('pairLbl').textContent=getLn(src)+' → '+getLn(tgt)}
function toggleDark(){darkMode=!darkMode;document.body.classList.toggle('dark',darkMode);$('darkToggle').classList.toggle('on',darkMode)}
function toggleSpeak(){speakOn=!speakOn;$('speakToggle').classList.toggle('on',speakOn)}
function setRate(v){speechRate=v/10;$('rateDesc').textContent=(v/10).toFixed(1)+'x'}
function setVoice(v){selectedVoice=v==='auto'?null:v;$('voiceDesc').textContent=v==='auto'?'自动选择':v}
function openSettings(){$('settingsOverlay').classList.add('show');refreshVoices()}
function closeSettings(e){if(e.target===$('settingsOverlay'))$('settingsOverlay').classList.remove('show')}
function refreshVoices(){var sel=$('voiceSel');if(sel.options.length>1)return;var voices=speechSynthesis.getVoices();var cur=tgt.split('-')[0];var seen={};voices.forEach(function(v){var l=v.lang.split('-')[0];if(!seen[v.name]){seen[v.name]=1;var o=document.createElement('option');o.value=v.name;o.textContent=(l===cur?'★ ':'')+v.name+' ('+v.lang+')';sel.appendChild(o)}})}

function toggle(){run?stop():go()}
function go(){
  if(!SR){alert('浏览器不支持');return}
  // 立刻开始，不等预热
  run=true;ct=0;chars=0;t0=Date.now();history=[];
  $('logsEl').innerHTML='';$('homeBtn').classList.add('active');$('ico').textContent='⏹';
  $('wave').classList.add('on');$('dot').className='dot rec';$('stxt').textContent='🔴 录音中...';
  startRec();
  // 异步预热 TTS（不阻塞启动）
  warmupTTS();
}
function stop(){
  run=false;isSpeaking=false;
  if(rec){try{rec.abort()}catch(e){}rec=null}
  try{speechSynthesis.cancel()}catch(e){}
  ttsQueue=[];ttsPlaying=false;
  $('homeBtn').classList.remove('active');$('ico').textContent='▶';
  $('wave').classList.remove('on');$('dot').className='dot';$('stxt').textContent='就绪';
}

function startRec(){
  rec=new SR();rec.lang=src;rec.continuous=true;rec.interimResults=true;
  rec.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var t=e.results[i][0].transcript;
      if(e.results[i].isFinal){
        var c=t.trim();
        if(c.length>0&&!done[c]){done[c]=1;handle(c);setTimeout(function(){delete done[c]},5000)}
      }else{interim+=t}
    }
    if(interim){$('stxt').textContent='🎤 '+interim.substring(0,40);if(subOn)$('subLive').textContent=interim}
  };
  rec.onend=function(){if(run&&!isSpeaking)restartRec()};
  rec.onerror=function(e){if(!run)return;if(e.error==='not-allowed'){alert('请允许麦克风');stop();return}if(run&&!isSpeaking)restartRec()};
  try{rec.start()}catch(e){stop()}
}
function restartRec(){
  setTimeout(function(){if(!run||isSpeaking)return;try{rec.start();$('stxt').textContent='🔴 录音中...'}catch(e){setTimeout(function(){if(!run||isSpeaking)return;try{rec.start()}catch(e2){}},200)}},100);
}

// 保活心跳（只在非播报时）
setInterval(function(){if(!run||!rec||isSpeaking)return;try{rec.start()}catch(e){}},3000);

async function handle(text){
  $('stxt').textContent='🔄 翻译中...';
  if(subOn){$('subOrig').textContent=text;$('subTrans').textContent='翻译中...';$('subLive').textContent=''}
  var tr='';
  if(mode==='both'){
    var r1=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    var r2=await doTranslate(text,tgt.split('-')[0],src.split('-')[0]);
    tr=r1;addLog(text,r1,'A→B');if(r2!==text)addLog(text,r2,'B→A');
  }else if(mode==='dialog'){
    tr=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    addLog(text,tr,'speaker-'+speaker);speaker=speaker==='A'?'B':'A';
  }else{
    tr=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    addLog(text,tr);
  }
  ct++;chars+=text.length;$('cnt').textContent=ct+' 句';
  $('stxt').textContent='🔴 录音中...';
  if(subOn){$('subTrans').textContent=tr;$('subLive').textContent=''}
  history.push({time:new Date().toISOString(),src:text,tgt:tr,mode:mode});
  if(speakOn)speak(tr,tgt);
}

async function doTranslate(text,from,to){
  var result='';
  if(engine==='parallel'){var r=await Promise.allSettled([gAPI(text,from,to),mAPI(text,from,to)]);for(var i=0;i<r.length;i++){if(r[i].status==='fulfilled'&&r[i].value){result=r[i].value;break}}}
  else if(engine==='google'){result=await gAPI(text,from,to)||''}
  else{result=await mAPI(text,from,to)||''}
  if(result)return result;
  if(typeof offlineTranslate==='function'){var off=offlineTranslate(text,from,to);if(off)return off}
  return text;
}
function gAPI(q,sl,tl){return new Promise(function(ok,no){var c=new AbortController();var t=setTimeout(function(){c.abort();no()},3000);fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl='+sl+'&tl='+tl+'&dt=t&q='+encodeURIComponent(q),{signal:c.signal}).then(function(r){return r.json()}).then(function(d){clearTimeout(t);if(d&&d[0])ok(d[0].map(function(p){return p[0]}).filter(Boolean).join(''));else no()}).catch(function(){clearTimeout(t);no()})})}
function mAPI(q,sl,tl){return new Promise(function(ok,no){var c=new AbortController();var t=setTimeout(function(){c.abort();no()},3000);fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(q)+'&langpair='+sl+'|'+tl,{signal:c.signal}).then(function(r){return r.json()}).then(function(d){clearTimeout(t);var v=d&&d.responseData&&d.responseData.translatedText;if(v&&v.toLowerCase()!==q.toLowerCase())ok(v);else no()}).catch(function(){clearTimeout(t);no()})})}

// ═══ TTS：优先本地 apple-speak → Google TTS → speechSynthesis ═══
var ttsQueue=[],ttsPlaying=false;
var ttsAudio=document.createElement('audio');ttsAudio.style.display='none';document.body.appendChild(ttsAudio);
var CORS_PROXIES=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
var LOCAL_TTS='http://localhost:8361/tts';

function speak(text,lang){
  if(!speakOn||!text)return;
  ttsQueue.push({text:text,lang:lang});
  if(!ttsPlaying)playNextTTS();
}
function playNextTTS(){
  if(ttsQueue.length===0){ttsPlaying=false;isSpeaking=false;setTimeout(function(){if(run)restartRec()},200);return}
  ttsPlaying=true;isSpeaking=true;
  $('dot').className='dot tts';$('stxt').textContent='🔊 播报中...';
  var item=ttsQueue.shift();
  // 优先本地 TTS
  tryLocalTTS(item.text,item.lang,function(){
    // 失败走 Google TTS
    tryGoogleTTS(item.text,item.lang);
  });
}
function tryLocalTTS(text,lang,onFail){
  var url=LOCAL_TTS+'?text='+encodeURIComponent(text)+'&lang='+lang+'&rate='+speechRate;
  fetch(url,{signal:AbortSignal.timeout(3000)}).then(function(r){return r.json()}).then(function(d){
    if(d.ok){playNextTTS();return}
    onFail();
  }).catch(function(){onFail()});
}
function tryGoogleTTS(text,lang){
  var lc=lang.split('-')[0];
  var ttsUrl='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(text)+'&tl='+lc+'&client=tw-ob&speed=0.9';
  ttsAudio.src=ttsUrl;
  ttsAudio.onended=function(){playNextTTS()};
  ttsAudio.onerror=function(){tryProxy(0,text,lang)};
  ttsAudio.play().catch(function(){tryProxy(0,text,lang)});
}
function tryProxy(idx,text,lang){
  if(idx>=CORS_PROXIES.length){trySpeech(text,lang,function(){playNextTTS()});return}
  var lc=lang.split('-')[0];
  var ttsUrl='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(text)+'&tl='+lc+'&client=tw-ob&speed=0.9';
  fetch(CORS_PROXIES[idx]+encodeURIComponent(ttsUrl)).then(function(r){if(!r.ok)throw 0;return r.blob()}).then(function(blob){
    var url=URL.createObjectURL(blob);ttsAudio.src=url;
    ttsAudio.onended=function(){URL.revokeObjectURL(url);playNextTTS()};
    ttsAudio.onerror=function(){URL.revokeObjectURL(url);tryProxy(idx+1,text,lang)};
    ttsAudio.play().catch(function(){URL.revokeObjectURL(url);tryProxy(idx+1,text,lang)});
  }).catch(function(){tryProxy(idx+1,text,lang)});
}
function trySpeech(text,lang,onDone){
  if(!window.speechSynthesis){onDone();return}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=speechRate;u.volume=1;
  var voices=speechSynthesis.getVoices();
  if(selectedVoice){var f=voices.find(function(v){return v.name===selectedVoice});if(f)u.voice=f}
  else{for(var i=0;i<voices.length;i++){if(voices[i].lang.indexOf(lang.split('-')[0])===0){u.voice=voices[i];break}}}
  u.onend=onDone;u.onerror=onDone;
  try{speechSynthesis.speak(u)}catch(e){onDone()}
}
function warmupTTS(){if(warmTts)return;warmTts=true;try{speechSynthesis.speak(new SpeechSynthesisUtterance(''))}catch(e){}}
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();refreshVoices()};

function addLog(a,b,tag){
  var el=$('logsEl');var emp=el.querySelector('.empty');if(emp)emp.remove();
  var t=new Date().toLocaleTimeString('zh-CN',{hour12:false});
  var d=document.createElement('div');d.className='item'+(tag==='speaker-a'?' speaker-a':tag==='speaker-b'?' speaker-b':'');
  var th=tag?'<span>'+tag+'</span>':'';
  d.innerHTML='<div class="src">'+esc(a)+'</div><div class="tgt">'+esc(b)+'</div><div class="meta"><span>🕐 '+t+'</span><span>#'+ct+'</span>'+th+'</div>';
  el.prepend(d);while(el.children.length>50)el.lastChild.remove();
}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;'):''}
function exportHistory(){
  if(history.length===0){alert('暂无翻译历史');return}
  var csv='时间,原文,译文,模式\n';history.forEach(function(h){csv+='"'+h.time+'","'+h.src.replace(/"/g,'""')+'","'+h.tgt.replace(/"/g,'""')+'","'+h.mode+'"\n'});
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='simulflow-history-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(url);
}
