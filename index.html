function toggleAcc(){$('accTrig').classList.toggle('open');$('accBody').classList.toggle('open')}
function setMode(m,btn){mode=m;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});btn.classList.add('on');if(m==='both')$('pairLbl').textContent='иҮӘеҠЁжЈҖжөӢ вҶ’ еҸҢеҗ‘';else if(m==='dialog')$('pairLbl').textContent='еҜ№иҜқжЁЎејҸ (AвҶ”B)';else $('pairLbl').textContent=getLn(src)+' вҶ’ '+getLn(tgt);if(run){stop();setTimeout(go,300)}}
function getLn(c){var p=PAIRS.find(function(x){return x[0]===c});return p?p[2]:c.split('-')[0]}
function toggleSubtitle(){subOn=!subOn;$('subBtn').classList.toggle('on',subOn);$('subOverlay').classList.toggle('show',subOn)}
function toggleSpeaker(){speakOn=!speakOn;$('spkBtn').classList.toggle('on',speakOn);$('spkBtn').innerHTML='<span class="ico">'+(speakOn?'рҹ”Ҡ':'рҹ”Ү')+'</span>'+(speakOn?'ж’ӯжҠҘејҖ':'ж’ӯжҠҘе…і')}
function swapLang(){var t=src;src=tgt;tgt=t;if(run){stop();setTimeout(go,300)}$('pairLbl').textContent=getLn(src)+' вҶ’ '+getLn(tgt)}
function toggleDark(){darkMode=!darkMode;document.body.classList.toggle('dark',darkMode);$('darkToggle').classList.toggle('on',darkMode)}
function toggleSpeak(){speakOn=!speakOn;$('speakToggle').classList.toggle('on',speakOn)}
function setRate(v){speechRate=v/10;$('rateDesc').textContent=(v/10).toFixed(1)+'x'}
function setVoice(v){selectedVoice=v==='auto'?null:v;$('voiceDesc').textContent=v==='auto'?'иҮӘеҠЁйҖүжӢ©':v}
function openSettings(){$('settingsOverlay').classList.add('show');refreshVoices()}
function closeSettings(e){if(e.target===$('settingsOverlay'))$('settingsOverlay').classList.remove('show')}
function refreshVoices(){var sel=$('voiceSel');if(sel.options.length>1)return;var voices=speechSynthesis.getVoices();var cur=tgt.split('-')[0];var seen={};voices.forEach(function(v){var l=v.lang.split('-')[0];if(!seen[v.name]){seen[v.name]=1;var o=document.createElement('option');o.value=v.name;o.textContent=(l===cur?'вҳ… ':'')+v.name+' ('+v.lang+')';sel.appendChild(o)}})}

function toggle(){run?stop():go()}
function go(){
  if(!SR){alert('жөҸи§ҲеҷЁдёҚж”ҜжҢҒ');return}
  // з«ӢеҲ»ејҖе§ӢпјҢдёҚзӯүйў„зғӯ
  run=true;ct=0;chars=0;t0=Date.now();history=[];
  $('logsEl').innerHTML='';$('homeBtn').classList.add('active');$('ico').textContent='вҸ№';
  $('wave').classList.add('on');$('dot').className='dot rec';$('stxt').textContent='рҹ”ҙ еҪ•йҹідёӯ...';
  startRec();
  // ејӮжӯҘйў„зғӯ TTSпјҲдёҚйҳ»еЎһеҗҜеҠЁпјү
  warmupTTS();
}
function stop(){
  run=false;isSpeaking=false;
  if(rec){try{rec.abort()}catch(e){}rec=null}
  try{speechSynthesis.cancel()}catch(e){}
  ttsQueue=[];ttsPlaying=false;
  $('homeBtn').classList.remove('active');$('ico').textContent='в–¶';
  $('wave').classList.remove('on');$('dot').className='dot';$('stxt').textContent='е°ұз»Ә';
}

function startRec(){
  rec=new SR();rec.lang=src;rec.continuous=true;rec.interimResults=true;
  rec.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var t=e.results[i][0].transcript;
      if(e.results[i].isFinal){
        var c=t.trim();
        if(c.length>0&&!done[c]){done[c]=1;handle(c);setTimeout(function(){delete done[c]},5000)}
      }else{interim+=t}
    }
    if(interim){$('stxt').textContent='рҹҺӨ '+interim.substring(0,40);if(subOn)$('subLive').textContent=interim}
  };
  rec.onend=function(){if(run&&!isSpeaking)restartRec()};
  rec.onerror=function(e){if(!run)return;if(e.error==='not-allowed'){alert('иҜ·е…Ғи®ёйәҰе…ӢйЈҺ');stop();return}if(run&&!isSpeaking)restartRec()};
  try{rec.start()}catch(e){stop()}
}
function restartRec(){
  setTimeout(function(){if(!run||isSpeaking)return;try{rec.start();$('stxt').textContent='рҹ”ҙ еҪ•йҹідёӯ...'}catch(e){setTimeout(function(){if(!run||isSpeaking)return;try{rec.start()}catch(e2){}},200)}},100);
}

// дҝқжҙ»еҝғи·іпјҲеҸӘеңЁйқһж’ӯжҠҘж—¶пјү
setInterval(function(){if(!run||!rec||isSpeaking)return;try{rec.start()}catch(e){}},3000);

async function handle(text){
  $('stxt').textContent='рҹ”„ зҝ»иҜ‘дёӯ...';
  if(subOn){$('subOrig').textContent=text;$('subTrans').textContent='зҝ»иҜ‘дёӯ...';$('subLive').textContent=''}
  var tr='';
  if(mode==='both'){
    var r1=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    var r2=await doTranslate(text,tgt.split('-')[0],src.split('-')[0]);
    tr=r1;addLog(text,r1,'AвҶ’B');if(r2!==text)addLog(text,r2,'BвҶ’A');
  }else if(mode==='dialog'){
    tr=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    addLog(text,tr,'speaker-'+speaker);speaker=speaker==='A'?'B':'A';
  }else{
    tr=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    addLog(text,tr);
  }
  ct++;chars+=text.length;$('cnt').textContent=ct+' еҸҘ';
  $('stxt').textContent='рҹ”ҙ еҪ•йҹідёӯ...';
  if(subOn){$('subTrans').textContent=tr;$('subLive').textContent=''}
  history.push({time:new Date().toISOString(),src:text,tgt:tr,mode:mode});
  if(speakOn)speak(tr,tgt);
}

async function doTranslate(text,from,to){
  var result='';
  if(engine==='parallel'){var r=await Promise.allSettled([gAPI(text,from,to),mAPI(text,from,to)]);for(var i=0;i<r.length;i++){if(r[i].status==='fulfilled'&&r[i].value){result=r[i].value;break}}}
  else if(engine==='google'){result=await gAPI(text,from,to)||''}
  else{result=await mAPI(text,from,to)||''}
  if(result)return result;
  if(typeof offlineTranslate==='function'){var off=offlineTranslate(text,from,to);if(off)return off}
  return text;
}
function gAPI(q,sl,tl){return new Promise(function(ok,no){var c=new AbortController();var t=setTimeout(function(){c.abort();no()},3000);fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl='+sl+'&tl='+tl+'&dt=t&q='+encodeURIComponent(q),{signal:c.signal}).then(function(r){return r.json()}).then(function(d){clearTimeout(t);if(d&&d[0])ok(d[0].map(function(p){return p[0]}).filter(Boolean).join(''));else no()}).catch(function(){clearTimeout(t);no()})})}
function mAPI(q,sl,tl){return new Promise(function(ok,no){var c=new AbortController();var t=setTimeout(function(){c.abort();no()},3000);fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(q)+'&langpair='+sl+'|'+tl,{signal:c.signal}).then(function(r){return r.json()}).then(function(d){clearTimeout(t);var v=d&&d.responseData&&d.responseData.translatedText;if(v&&v.toLowerCase()!==q.toLowerCase())ok(v);else no()}).catch(function(){clearTimeout(t);no()})})}

// в•җв•җв•җ TTSпјҡжҡӮеҒңеҪ•йҹі вҶ’ ж’ӯжҠҘ вҶ’ жҒўеӨҚеҪ•йҹі в•җв•җв•җ
var ttsQueue=[],ttsPlaying=false;
var ttsAudio=document.createElement('audio');ttsAudio.style.display='none';document.body.appendChild(ttsAudio);
var CORS_PROXIES=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];

function speak(text,lang){
  if(!speakOn||!text)return;
  ttsQueue.push({text:text,lang:lang});
  if(!ttsPlaying)playNextTTS();
}
function playNextTTS(){
  if(ttsQueue.length===0){ttsPlaying=false;isSpeaking=false;setTimeout(function(){if(run)restartRec()},200);return}
  ttsPlaying=true;isSpeaking=true;
  $('dot').className='dot tts';$('stxt').textContent='рҹ”Ҡ ж’ӯжҠҘдёӯ...';
  var item=ttsQueue.shift();
  var lc=item.lang.split('-')[0];
  var ttsUrl='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(item.text)+'&tl='+lc+'&client=tw-ob&speed=0.9';
  
  // е°қиҜ•зӣҙжҺҘж’ӯж”ҫ
  ttsAudio.src=ttsUrl;
  ttsAudio.onended=function(){playNextTTS()};
  ttsAudio.onerror=function(){tryProxy(0,item.text,item.lang)};
  ttsAudio.play().catch(function(){tryProxy(0,item.text,item.lang)});
}
function tryProxy(idx,text,lang){
  if(idx>=CORS_PROXIES.length){trySpeech(text,lang,function(){playNextTTS()});return}
  var lc=lang.split('-')[0];
  var ttsUrl='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(text)+'&tl='+lc+'&client=tw-ob&speed=0.9';
  fetch(CORS_PROXIES[idx]+encodeURIComponent(ttsUrl)).then(function(r){if(!r.ok)throw 0;return r.blob()}).then(function(blob){
    var url=URL.createObjectURL(blob);ttsAudio.src=url;
    ttsAudio.onended=function(){URL.revokeObjectURL(url);playNextTTS()};
    ttsAudio.onerror=function(){URL.revokeObjectURL(url);tryProxy(idx+1,text,lang)};
    ttsAudio.play().catch(function(){URL.revokeObjectURL(url);tryProxy(idx+1,text,lang)});
  }).catch(function(){tryProxy(idx+1,text,lang)});
}
function trySpeech(text,lang,onDone){
  if(!window.speechSynthesis){onDone();return}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=speechRate;u.volume=1;
  var voices=speechSynthesis.getVoices();
  if(selectedVoice){var f=voices.find(function(v){return v.name===selectedVoice});if(f)u.voice=f}
  else{for(var i=0;i<voices.length;i++){if(voices[i].lang.indexOf(lang.split('-')[0])===0){u.voice=voices[i];break}}}
  u.onend=onDone;u.onerror=onDone;
  try{speechSynthesis.speak(u)}catch(e){onDone()}
}
function warmupTTS(){
  if(warmTts)return;warmTts=true;
  try{speechSynthesis.speak(new SpeechSynthesisUtterance(''))}catch(e){}
}
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();refreshVoices()};

function addLog(a,b,tag){
  var el=$('logsEl');var emp=el.querySelector('.empty');if(emp)emp.remove();
  var t=new Date().toLocaleTimeString('zh-CN',{hour12:false});
  var d=document.createElement('div');d.className='item'+(tag==='speaker-a'?' speaker-a':tag==='speaker-b'?' speaker-b':'');
  var th=tag?'<span>'+tag+'</span>':'';
  d.innerHTML='<div class="src">'+esc(a)+'</div><div class="tgt">'+esc(b)+'</div><div class="meta"><span>рҹ•җ '+t+'</span><span>#'+ct+'</span>'+th+'</div>';
  el.prepend(d);while(el.children.length>50)el.lastChild.remove();
}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;'):''}
function exportHistory(){
  if(history.length===0){alert('жҡӮж— зҝ»иҜ‘еҺҶеҸІ');return}
  var csv='ж—¶й—ҙ,еҺҹж–Ү,иҜ‘ж–Ү,жЁЎејҸ\n';history.forEach(function(h){csv+='"'+h.time+'","'+h.src.replace(/"/g,'""')+'","'+h.tgt.replace(/"/g,'""')+'","'+h.mode+'"\n'});
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='simulflow-history-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(url);
}
