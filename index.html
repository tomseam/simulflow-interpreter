<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>同声传译</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f2f7;--card:rgba(255,255,255,.72);--card2:rgba(255,255,255,.45);
  --text:#1d1d1f;--sub:#86868b;--border:rgba(0,0,0,.06);
  --accent:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--purple:#af52de;
  --blur:20px;--r:18px;--shadow:0 4px 24px rgba(0,0,0,.06);
}
.dark{
  --bg:#000;--card:rgba(28,28,30,.78);--card2:rgba(44,44,46,.5);
  --text:#f5f5f7;--sub:#8e8e93;--border:rgba(255,255,255,.08);
  --accent:#0a84ff;--green:#30d158;--red:#ff453a;--orange:#ff9f0a;--purple:#bf5af2;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .3s,color .3s}
body.dark{background:#000;color:#f5f5f7}

/* ─── 背景 ─── */
.bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bg .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;will-change:transform;animation:float 20s ease-in-out infinite}
body.dark .bg .blob{opacity:.18}
.bg .b1{width:340px;height:340px;background:#007aff;top:-80px;left:-60px}
.bg .b2{width:280px;height:280px;background:#bf5af2;top:40%;right:-80px;animation-delay:-7s}
.bg .b3{width:260px;height:260px;background:#30d158;bottom:-60px;left:30%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.05)}50%{transform:translate(-20px,30px) scale(.95)}75%{transform:translate(20px,10px) scale(1.02)}}

.wrap{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;overflow:hidden}

/* ─── Glass ─── */
.glass{background:var(--card);-webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}

/* ─── Header ─── */
.hdr{padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr .title{text-align:center;flex:1}
.hdr .title h1{font-size:17px;font-weight:700}
.hdr .title p{font-size:9px;color:var(--sub);margin-top:1px}
.hdr-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--card);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.hdr-btn:active{transform:scale(.9)}

/* ─── Tab Bar ─── */
.tabs{display:flex;gap:4px;padding:4px 14px;flex-shrink:0}
.tab{flex:1;padding:8px;border-radius:10px;border:none;background:transparent;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.on{background:var(--accent);color:#fff}

/* ─── 语言面板 ─── */
.acc{margin:6px 14px 0;flex-shrink:0}
.acc-trig{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;cursor:pointer}
.acc-trig:active{transform:scale(.98)}
.acc-trig .tri{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:9px solid var(--accent);transition:transform .3s}
.acc-trig.open .tri{transform:rotate(180deg)}
.acc-trig .val{font-size:13px;color:var(--accent);font-weight:600}
.acc-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);margin-top:6px}
.acc-body.open{max-height:800px}
.acc-inner{padding:10px}
.acc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.acc-item{padding:12px 4px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;background:var(--card2)}
.acc-item:active{transform:scale(.95)}
.acc-item.sel{border-color:var(--accent);background:rgba(0,122,255,.1)}
.acc-item .fl{font-size:20px;display:block;margin-bottom:2px}
.acc-item .nm{font-size:10px;font-weight:600}

/* ─── 状态 ─── */
.status{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--sub);transition:all .3s}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.rec{background:var(--red);box-shadow:0 0 10px var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-size:11px;color:var(--sub)}

/* ─── 波形 ─── */
.wave{display:flex;align-items:center;justify-content:center;gap:2px;height:20px;flex-shrink:0;opacity:0;transition:opacity .3s}
.wave.on{opacity:1}
.wave i{width:2.5px;background:var(--accent);border-radius:2px;display:block;animation:wv .5s ease-in-out infinite}
.wave i:nth-child(1){height:6px;animation-delay:0s}
.wave i:nth-child(2){height:12px;animation-delay:.08s}
.wave i:nth-child(3){height:18px;animation-delay:.16s}
.wave i:nth-child(4){height:12px;animation-delay:.24s}
.wave i:nth-child(5){height:6px;animation-delay:.32s}
@keyframes wv{0%,100%{transform:scaleY(.25)}50%{transform:scaleY(1)}}

/* ─── 内容区 ─── */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 14px;min-height:0}
.content-hdr{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;padding:4px 2px;flex-shrink:0;display:flex;justify-content:space-between}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}

/* 翻译记录 */
.item{padding:12px;margin-bottom:6px;border-radius:14px;background:var(--card);-webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));border:1px solid var(--border);box-shadow:var(--shadow);animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.item .src{font-size:14px;line-height:1.5;color:var(--text);margin-bottom:2px}
.item .tgt{font-size:13px;line-height:1.5;color:var(--accent);font-weight:500}
.item .meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.item .meta span{font-size:9px;color:var(--sub);padding:2px 6px;border-radius:4px;background:var(--card2)}
.item .speaker-a .src{color:var(--accent)}
.item .speaker-b .src{color:var(--purple)}
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:12px;line-height:2.2}

/* ─── 底部控制 ─── */
.bottom{flex-shrink:0;padding:6px 14px 0}
.toolbar{display:flex;gap:6px;margin-bottom:8px}
.tool-btn{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--card);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);font-size:11px;font-weight:600;color:var(--text);cursor:pointer;text-align:center;transition:all .15s}
.tool-btn:active{transform:scale(.95)}
.tool-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool-btn .ico{font-size:16px;display:block;margin-bottom:2px}

/* Home Button */
.home-area{display:flex;justify-content:center;padding:6px 0 12px}
.home-btn{width:64px;height:64px;border-radius:50%;border:3px solid var(--border);background:var(--card);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.home-btn:active{transform:scale(.9)}
.home-btn .ring{width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,#fff,#e8e8ed);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
body.dark .home-btn .ring{background:linear-gradient(145deg,#3a3a3c,#2c2c2e);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.home-btn.active{border-color:var(--green);box-shadow:0 0 24px rgba(52,199,89,.25)}
.home-btn.active .ring{background:linear-gradient(145deg,var(--green),#28a745);box-shadow:0 0 16px rgba(52,199,89,.3)}
.home-btn.active .ring .ico{color:#fff}

/* ─── Stats ─── */
.stats{display:flex;justify-content:center;gap:16px;padding:6px;border-top:1px solid var(--border);flex-shrink:0}
.stat{text-align:center}
.stat .n{font-size:13px;font-weight:700;color:var(--accent)}
.stat .l{font-size:7px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}

/* ─── 全屏字幕模式 ─── */
.subtitle-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center;padding:40px}
.subtitle-overlay.show{display:flex}
.subtitle-overlay .orig{font-size:28px;color:#fff;text-align:center;line-height:1.5;margin-bottom:16px;max-width:80%}
.subtitle-overlay .trans{font-size:36px;color:var(--accent);text-align:center;line-height:1.5;font-weight:700;max-width:80%}
.subtitle-overlay .close-btn{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer}
.subtitle-overlay .live-sub{font-size:20px;color:rgba(255,255,255,.5);margin-top:20px;text-align:center}

/* ─── 设置面板 ─── */
.settings-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:998;background:rgba(0,0,0,.5);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);flex-direction:column;justify-content:flex-end}
.settings-overlay.show{display:flex}
.settings-panel{background:var(--card);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-radius:20px 20px 0 0;padding:20px;max-height:70vh;overflow-y:auto}
.settings-panel h3{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px;font-weight:500}
.setting-desc{font-size:11px;color:var(--sub);margin-top:2px}
.setting-toggle{width:50px;height:30px;border-radius:15px;border:none;background:var(--sub);cursor:pointer;position:relative;transition:background .3s}
.setting-toggle.on{background:var(--green)}
.setting-toggle::after{content:'';position:absolute;top:2px;left:2px;width:26px;height:26px;border-radius:50%;background:#fff;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.setting-toggle.on::after{transform:translateX(20px)}
.setting-select{padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;outline:none}
.setting-range{-webkit-appearance:none;width:120px;height:4px;background:var(--sub);border-radius:2px;outline:none}
.setting-range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer}
</style>
</head>
<body>
<div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="wrap">
  <!-- Header -->
  <div class="hdr">
    <button class="hdr-btn" onclick="exportHistory()" title="导出历史">📤</button>
    <div class="title"><h1>🌐 同声传译</h1><p>SimulFlow · Perfect Edition</p></div>
    <button class="hdr-btn" onclick="openSettings()" title="设置">⚙️</button>
  </div>

  <!-- Tab Bar: 模式切换 -->
  <div class="tabs">
    <button class="tab on" onclick="setMode('single',this)">单向翻译</button>
    <button class="tab" onclick="setMode('both',this)">双向翻译</button>
    <button class="tab" onclick="setMode('dialog',this)">对话模式</button>
  </div>

  <!-- 语言面板 -->
  <div class="acc glass" id="accBox">
    <div class="acc-trig" id="accTrig" onclick="toggleAcc()">
      <div class="tri"></div>
      <span class="val" id="pairLbl">中文 → English</span>
    </div>
    <div class="acc-body" id="accBody">
      <div class="acc-inner">
        <div class="acc-grid" id="grid"></div>
      </div>
    </div>
  </div>

  <!-- 状态 -->
  <div class="status"><div class="dot" id="dot"></div><span class="stxt" id="stxt">就绪</span></div>
  <div class="wave" id="wave"><i></i><i></i><i></i><i></i><i></i></div>

  <!-- 翻译记录 -->
  <div class="content">
    <div class="content-hdr"><span>翻译记录</span><span id="cnt">0 句</span></div>
    <div class="scroll" id="logsEl">
      <div class="empty">🎧 连接 AirPods<br>点击开始按钮<br>支持单向/双向/对话三种模式</div>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="bottom">
    <div class="toolbar">
      <button class="tool-btn" onclick="toggleSubtitle()" id="subBtn"><span class="ico">📺</span>字幕</button>
      <button class="tool-btn" onclick="toggleSpeaker()" id="spkBtn"><span class="ico">🔊</span>播报开</button>
      <button class="tool-btn" onclick="swapLang()" id="swapBtn"><span class="ico">🔄</span>互换</button>
    </div>

    <!-- Home Button -->
    <div class="home-area">
      <div class="home-btn" id="homeBtn" onclick="toggle()">
        <div class="ring"><span class="ico" id="ico">▶</span></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="n" id="s1">0</div><div class="l">翻译</div></div>
      <div class="stat"><div class="n" id="s2">0</div><div class="l">字符</div></div>
      <div class="stat"><div class="n" id="s3">0s</div><div class="l">时长</div></div>
    </div>
  </div>
</div>

<!-- 全屏字幕 -->
<div class="subtitle-overlay" id="subOverlay">
  <button class="close-btn" onclick="toggleSubtitle()">✕</button>
  <div class="orig" id="subOrig"></div>
  <div class="trans" id="subTrans"></div>
  <div class="live-sub" id="subLive"></div>
</div>

<!-- 设置面板 -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h3>⚙️ 设置</h3>
    <div class="setting-row">
      <div><div class="setting-label">深色模式</div><div class="setting-desc">跟随系统或手动切换</div></div>
      <button class="setting-toggle" id="darkToggle" onclick="toggleDark()"></button>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">自动播报</div><div class="setting-desc">翻译完成后自动语音播报</div></div>
      <button class="setting-toggle on" id="speakToggle" onclick="toggleSpeak()"></button>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">播报声音</div><div class="setting-desc" id="voiceDesc">自动选择</div></div>
      <select class="setting-select" id="voiceSel" onchange="setVoice(this.value)" style="max-width:140px;font-size:11px">
        <option value="auto">自动</option>
      </select>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">播报语速</div><div class="setting-desc" id="rateDesc">0.85x</div></div>
      <input type="range" class="setting-range" id="rateRange" min="3" max="10" value="8" oninput="setRate(this.value)">
    </div>
    <div class="setting-row">
      <div><div class="setting-label">翻译引擎</div><div class="setting-desc">并行模式同时请求两个API</div></div>
      <select class="setting-select" id="engineSel" onchange="setEngine(this.value)">
        <option value="parallel">并行(最快)</option>
        <option value="google">Google</option>
        <option value="mymemory">MyMemory</option>
      </select>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">导出翻译历史</div><div class="setting-desc">下载CSV文件</div></div>
      <button class="tool-btn" style="flex:none;padding:8px 16px" onclick="exportHistory()">📤 导出</button>
    </div>
  </div>
</div>

<script src="dict.js"></script>
<script>
// ═══════════════════════════════════════════════
//  SimulFlow Perfect Edition
// ═══════════════════════════════════════════════

var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var src='zh-CN',tgt='en-US',run=false,rec=null,ct=0,chars=0,t0=0;
var done={},warmTts=false;
var mode='single'; // single|both|dialog
var speaker='A'; // dialog mode
var speakOn=true,subOn=false,darkMode=false,engine='parallel',speechRate=0.85;
var selectedVoice=null; // null=自动
var history=[]; // 翻译历史

var PAIRS=[
['zh-CN','en-US','中文','English','🇨🇳','🇺🇸'],
['en-US','zh-CN','English','中文','🇺🇸','🇨🇳'],
['zh-CN','ja-JP','中文','日本語','🇨🇳','🇯🇵'],
['ja-JP','zh-CN','日本語','中文','🇯🇵','🇨🇳'],
['zh-CN','ko-KR','中文','한국어','🇨🇳','🇰🇷'],
['ko-KR','zh-CN','한국어','中文','🇰🇷','🇨🇳'],
['en-US','ja-JP','English','日本語','🇺🇸','🇯🇵'],
['ja-JP','en-US','日本語','English','🇯🇵','🇺🇸'],
['en-US','ko-KR','English','한국어','🇺🇸','🇰🇷'],
['ko-KR','en-US','한국어','English','🇰🇷','🇺🇸'],
['en-US','fr-FR','English','Français','🇺🇸','🇫🇷'],
['fr-FR','en-US','Français','English','🇫🇷','🇺🇸'],
['en-US','de-DE','English','Deutsch','🇺🇸','🇩🇪'],
['de-DE','en-US','Deutsch','English','🇩🇪','🇺🇸'],
['en-US','es-ES','English','Español','🇺🇸','🇪🇸'],
['es-ES','en-US','Español','English','🇪🇸','🇺🇸'],
['en-US','ru-RU','English','Русский','🇺🇸','🇷🇺'],
['ru-RU','en-US','Русский','English','🇷🇺','🇺🇸'],
['en-US','vi-VN','English','Tiếng Việt','🇺🇸','🇻🇳'],
['vi-VN','en-US','Tiếng Việt','English','🇻🇳','🇺🇸'],
['en-US','th-TH','English','ไทย','🇺🇸','🇹🇭'],
['th-TH','en-US','ไทย','English','🇹🇭','🇺🇸'],
['en-US','ar-SA','English','العربية','🇺🇸','🇸🇦'],
['ar-SA','en-US','العربية','English','🇸🇦','🇺🇸'],
['en-US','hi-IN','English','हिन्दी','🇺🇸','🇮🇳'],
['hi-IN','en-US','हिन्दी','English','🇮🇳','🇺🇸'],
['en-US','pt-BR','English','Português','🇺🇸','🇧🇷'],
['en-US','it-IT','English','Italiano','🇺🇸','🇮🇹'],
['en-US','id-ID','English','Bahasa','🇺🇸','🇮🇩'],
['ja-JP','ko-KR','日本語','한국어','🇯🇵','🇰🇷'],
['ko-KR','ja-JP','한국어','日本語','🇰🇷','🇯🇵'],
['fr-FR','de-DE','Français','Deutsch','🇫🇷','🇩🇪'],
['fr-FR','es-ES','Français','Español','🇫🇷','🇪🇸'],
['de-DE','es-ES','Deutsch','Español','🇩🇪','🇪🇸'],
['zh-CN','fr-FR','中文','Français','🇨🇳','🇫🇷'],
['zh-CN','de-DE','中文','Deutsch','🇨🇳','🇩🇪'],
['zh-CN','es-ES','中文','Español','🇨🇳','🇪🇸'],
['zh-CN','ru-RU','中文','Русский','🇨🇳','🇷🇺'],
];

// ─── 初始化 ───
var grid=document.getElementById('grid');
PAIRS.forEach(function(p){
  var d=document.createElement('div');
  d.className='acc-item'+(p[0]===src&&p[1]===tgt?' sel':'');
  d.innerHTML='<span class="fl">'+p[4]+'→'+p[5]+'</span><div class="nm">'+p[2]+'→'+p[3]+'</div>';
  d.onclick=function(){
    src=p[0];tgt=p[1];
    grid.querySelectorAll('.acc-item').forEach(function(x){x.classList.remove('sel')});
    d.classList.add('sel');
    document.getElementById('pairLbl').textContent=p[2]+' → '+p[3];
    toggleAcc();
    if(run){stop();setTimeout(go,300)}
  };
  grid.appendChild(d);
});

// 检测系统主题
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){darkMode=true;document.body.classList.add('dark');document.getElementById('darkToggle').classList.add('on')}

function $(id){return document.getElementById(id)}
function toggleAcc(){$('accTrig').classList.toggle('open');$('accBody').classList.toggle('open')}

// ─── 模式切换 ───
function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});
  btn.classList.add('on');
  if(m==='both')$('pairLbl').textContent='自动检测 → 双向翻译';
  else if(m==='dialog')$('pairLbl').textContent='对话模式 (A/B轮换)';
  else $('pairLbl').textContent=getLangName(src)+' → '+getLangName(tgt);
  if(run){stop();setTimeout(go,300)}
}

function getLangName(code){
  var p=PAIRS.find(function(x){return x[0]===code});
  return p?p[2]:code.split('-')[0];
}

// ─── 工具栏 ───
function toggleSubtitle(){subOn=!subOn;$('subBtn').classList.toggle('on',subOn);$('subOverlay').classList.toggle('show',subOn)}
function toggleSpeaker(){speakOn=!speakOn;$('spkBtn').classList.toggle('on',speakOn);$('spkBtn').innerHTML='<span class="ico">'+(speakOn?'🔊':'🔇')+'</span>'+(speakOn?'播报开':'播报关')}
function swapLang(){var t=src;src=tgt;tgt=t;if(run){stop();setTimeout(go,300)}$('pairLbl').textContent=getLangName(src)+' → '+getLangName(tgt)}
function toggleDark(){darkMode=!darkMode;document.body.classList.toggle('dark',darkMode);$('darkToggle').classList.toggle('on',darkMode)}
function toggleSpeak(){speakOn=!speakOn;$('speakToggle').classList.toggle('on',speakOn)}
function setRate(v){speechRate=v/10;document.getElementById('rateDesc').textContent=(v/10).toFixed(1)+'x'}
function setEngine(v){engine=v}
function setVoice(v){selectedVoice=v==='auto'?null:v;document.getElementById('voiceDesc').textContent=v==='auto'?'自动选择':v}
function openSettings(){
  $('settingsOverlay').classList.add('show');
  refreshVoices();
}
function closeSettings(e){if(e.target=== $('settingsOverlay'))$('settingsOverlay').classList.remove('show')}

// 刷新声音列表
function refreshVoices(){
  var sel=$('voiceSel');
  if(sel.options.length>1)return; // 已填充
  var voices=speechSynthesis.getVoices();
  var currentLang=tgt.split('-')[0];
  // 按语言分组
  var groups={};
  voices.forEach(function(v){
    var lang=v.lang.split('-')[0];
    if(!groups[lang])groups[lang]=[];
    groups[lang].push(v);
  });
  // 先添加当前语言的声音
  if(groups[currentLang]){
    var grp=document.createElement('optgroup');
    grp.label=getLangName(currentLang+'-XX')||currentLang;
    groups[currentLang].forEach(function(v){
      var opt=document.createElement('option');
      opt.value=v.name;
      opt.textContent=v.name+(v.localService?' (本地)':' (在线)');
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  }
  // 添加其他语言
  Object.keys(groups).sort().forEach(function(lang){
    if(lang===currentLang)return;
    var grp=document.createElement('optgroup');
    grp.label=lang;
    groups[lang].forEach(function(v){
      var opt=document.createElement('option');
      opt.value=v.name;
      opt.textContent=v.name;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });
}

// ─── 控制 ───
function toggle(){run?stop():go()}

function go(){
  if(!SR){alert('浏览器不支持语音识别');return}
  // iOS TTS 预热：必须在用户手势中调用
  if(!warmTts){
    try{
      speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance('准备就绪');
      u.lang='zh-CN';u.volume=1;u.rate=1;
      u.onend=function(){warmTts=true};
      u.onerror=function(){warmTts=true};
      speechSynthesis.speak(u);
    }catch(e){warmTts=true}
  }
  run=true;ct=0;chars=0;t0=Date.now();history=[];
  $('logsEl').innerHTML='';
  $('homeBtn').classList.add('active');$('ico').textContent='⏹';
  $('wave').classList.add('on');$('dot').className='dot rec';
  $('stxt').textContent='🔴 录音中...';
  startRec();
}

function stop(){
  run=false;
  if(rec){try{rec.abort()}catch(e){}rec=null}
  try{speechSynthesis.cancel()}catch(e){}
  $('homeBtn').classList.remove('active');$('ico').textContent='▶';
  $('wave').classList.remove('on');$('dot').className='dot';
  $('stxt').textContent='就绪';
}

function startRec(){
  rec=new SR();rec.lang=src;rec.continuous=true;rec.interimResults=true;
  rec.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var t=e.results[i][0].transcript;
      if(e.results[i].isFinal){
        var c=t.trim();
        if(c.length>0&&!done[c]){done[c]=1;handle(c);setTimeout(function(){delete done[c]},5000)}
      }else{interim+=t}
    }
    if(interim){$('stxt').textContent='🎤 '+interim.substring(0,40);if(subOn)$('subLive').textContent=interim}
  };
  rec.onend=function(){if(run)restartRec()};
  rec.onerror=function(e){if(!run)return;if(e.error==='not-allowed'){alert('请允许麦克风');stop();return}if(run)restartRec()};
  try{rec.start()}catch(e){stop()}
}

function restartRec(){
  setTimeout(function(){
    if(!run)return;
    try{rec.start();$('stxt').textContent='🔴 录音中...'}
    catch(e){setTimeout(function(){if(!run)return;try{rec.start()}catch(e2){$('stxt').textContent='⚠️ 异常，点击重试'}},200)}
  },100);
}

// 保活心跳
setInterval(function(){if(!run||!rec)return;try{rec.start()}catch(e){}},2500);

// ─── 翻译处理 ───
async function handle(text){
  $('stxt').textContent='🔄 翻译中...';
  if(subOn){$('subOrig').textContent=text;$('subTrans').textContent='翻译中...';$('subLive').textContent=''}

  var tr='';
  if(mode==='both'){
    // 双向：同时翻译两个方向
    var r1=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    var r2=await doTranslate(text,tgt.split('-')[0],src.split('-')[0]);
    tr=r1;
    addLog(text,r1,'A→B');
    if(r2!==text)addLog(text,r2,'B→A');
  }else if(mode==='dialog'){
    // 对话模式：标记说话人
    tr=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    addLog(text,tr,'speaker-'+speaker);
    speaker=speaker==='A'?'B':'A'; // 自动轮换
  }else{
    // 单向
    tr=await doTranslate(text,src.split('-')[0],tgt.split('-')[0]);
    addLog(text,tr);
  }

  ct++;chars+=text.length;
  $('s1').textContent=ct;$('s2').textContent=chars;$('cnt').textContent=ct+' 句';
  $('stxt').textContent='🔴 录音中...';
  if(subOn){$('subTrans').textContent=tr;$('subLive').textContent=''}

  // 保存历史
  history.push({time:new Date().toISOString(),src:text,tgt:tr,mode:mode});

  if(speakOn)speak(tr,mode==='both'?tgt:tgt);
}

async function doTranslate(text,from,to){
  var result='';
  if(engine==='parallel'){
    var r=await Promise.allSettled([gAPI(text,from,to),mAPI(text,from,to)]);
    for(var i=0;i<r.length;i++){if(r[i].status==='fulfilled'&&r[i].value){result=r[i].value;break}}
  }else if(engine==='google'){
    result=await gAPI(text,from,to)||'';
  }else{
    result=await mAPI(text,from,to)||'';
  }
  if(result)return result;
  // 离线词典备选
  if(typeof offlineTranslate==='function'){
    var offline=offlineTranslate(text,from,to);
    if(offline)return offline;
  }
  return text;
}

function gAPI(q,sl,tl){return new Promise(function(ok,no){var c=new AbortController();var t=setTimeout(function(){c.abort();no()},3000);fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl='+sl+'&tl='+tl+'&dt=t&q='+encodeURIComponent(q),{signal:c.signal}).then(function(r){return r.json()}).then(function(d){clearTimeout(t);if(d&&d[0])ok(d[0].map(function(p){return p[0]}).filter(Boolean).join(''));else no()}).catch(function(){clearTimeout(t);no()})})}
function mAPI(q,sl,tl){return new Promise(function(ok,no){var c=new AbortController();var t=setTimeout(function(){c.abort();no()},3000);fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(q)+'&langpair='+sl+'|'+tl,{signal:c.signal}).then(function(r){return r.json()}).then(function(d){clearTimeout(t);var v=d&&d.responseData&&d.responseData.translatedText;if(v&&v.toLowerCase()!==q.toLowerCase())ok(v);else no()}).catch(function(){clearTimeout(t);no()})})}

function speak(text,lang){
  if(!speakOn||!text||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);u.lang=lang;u.rate=speechRate;u.volume=1;
  var voices=speechSynthesis.getVoices();
  // 如果用户选了特定声音
  if(selectedVoice){
    var found=voices.find(function(v){return v.name===selectedVoice});
    if(found)u.voice=found;
  }else{
    // 自动匹配语言
    var currentLang=lang.split('-')[0];
    for(var i=0;i<voices.length;i++){
      if(voices[i].lang.indexOf(currentLang)===0){u.voice=voices[i];break}
    }
  }
  u.onend=function(){if(run)restartRec()};
  u.onerror=function(e){
    console.warn('TTS error:',e);
    try{speechSynthesis.speak(u)}catch(e2){}
    if(run)setTimeout(function(){restartRec()},500);
  };
  try{speechSynthesis.speak(u)}catch(e){
    if(run)restartRec();
  }
}
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();refreshVoices()};

// ─── UI ───
function addLog(a,b,tag){
  var el=$('logsEl');var emp=el.querySelector('.empty');if(emp)emp.remove();
  var t=new Date().toLocaleTimeString('zh-CN',{hour12:false});
  var d=document.createElement('div');
  var cls='item';
  if(tag==='speaker-a')cls+=' speaker-a';
  else if(tag==='speaker-b')cls+=' speaker-b';
  d.className=cls;
  var tagHtml=tag?'<span>'+tag+'</span>':'';
  d.innerHTML='<div class="src">'+esc(a)+'</div><div class="tgt">'+esc(b)+'</div><div class="meta"><span>🕐 '+t+'</span><span>#'+ct+'</span>'+tagHtml+'</div>';
  el.prepend(d);while(el.children.length>50)el.lastChild.remove();
}

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;'):''}

// ─── 导出历史 ───
function exportHistory(){
  if(history.length===0){alert('暂无翻译历史');return}
  var csv='时间,原文,译文,模式\n';
  history.forEach(function(h){
    csv+='"'+h.time+'","'+h.src.replace(/"/g,'""')+'","'+h.tgt.replace(/"/g,'""')+'","'+h.mode+'"\n';
  });
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='simulflow-history-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
}

setInterval(function(){if(run&&t0)$('s3').textContent=Math.floor((Date.now()-t0)/1000)+'s'},1000);
</script>
